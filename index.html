<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNS Tumor GEO Explorer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #0B1D3A;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #E0E6ED;
      }

      .header {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      .header h1 {
        color: #FFFFFF;
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 0.6rem;
      }

      .header p {
        color: #7EB8DA;
        font-size: 1rem;
        font-weight: 300;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        max-width: 960px;
        width: 100%;
      }

      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(126, 184, 218, 0.15);
        border-radius: 8px;
        padding: 2.2rem 1.5rem;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: background 0.25s, border-color 0.25s, transform 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .card:hover {
        background: rgba(126, 184, 218, 0.08);
        border-color: rgba(126, 184, 218, 0.35);
        transform: translateY(-2px);
      }

      .card .icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
        background: rgba(126, 184, 218, 0.1);
        border: 1px solid rgba(126, 184, 218, 0.2);
      }

      .card .title-zh {
        font-size: 1.3rem;
        font-weight: 500;
        color: #FFFFFF;
      }

      .card .title-en {
        font-size: 0.85rem;
        color: #7EB8DA;
        font-weight: 300;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .view-all {
        margin-top: 2.5rem;
        text-align: center;
      }

      .view-all a {
        color: #7EB8DA;
        font-size: 0.9rem;
        text-decoration: none;
        border: 1px solid rgba(126, 184, 218, 0.3);
        padding: 0.6rem 1.8rem;
        border-radius: 4px;
        letter-spacing: 0.04em;
        font-weight: 400;
        transition: background 0.2s, color 0.2s, border-color 0.2s;
      }

      .view-all a:hover {
        background: rgba(126, 184, 218, 0.12);
        border-color: #7EB8DA;
        color: #FFFFFF;
      }

      .separator {
        width: 40px;
        height: 1px;
        background: #2E6F8E;
        margin: 0 auto 2rem;
      }

      @media (max-width: 700px) {
        .cards {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CNS Tumor Multi-Omics Explorer</h1>
      <div class="separator"></div>
      <p>GEO Dataset Browser</p>
    </div>

    <div class="cards">
      <a class="card" href="explorer.html?type=Glioma">
        <div class="icon">&#x1F9E0;</div>
        <div class="title-zh">胶质瘤</div>
        <div class="title-en">Glioma</div>
      </a>
      <a class="card" href="explorer.html?type=Brain%20Metastasis">
        <div class="icon">&#x1F52C;</div>
        <div class="title-zh">脑转移瘤</div>
        <div class="title-en">Brain Metastasis</div>
      </a>
      <a class="card" href="explorer.html?type=Other">
        <div class="icon">&#x1F9EC;</div>
        <div class="title-zh">其他 CNS 肿瘤</div>
        <div class="title-en">Other CNS Tumors</div>
      </a>
    </div>

    <div class="view-all">
      <a href="explorer.html">View All Data</a>
    </div>
  </body>
</html>
