    <title>CNS Tumor Multi-Omics Explorer</title>
    <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var filterType = params.get('type');
      var originalFetch = window.fetch;
      window.fetch = function(resource, init) {
        var requestUrl = resource && resource.toString ? resource.toString() : '';
        if (requestUrl.includes('geo_data.json')) {
          var separator = requestUrl.indexOf('?') === -1 ? '?' : '&';
          resource = requestUrl + separator + 'ts=' + Date.now();
          init = Object.assign({}, init || {}, { cache: 'no-store' });
        }
        return originalFetch.call(this, resource, init).then(function(response) {
          if (requestUrl.includes('geo_data.json')) {
            return response.json().then(function(data) {
              if (!filterType) {
                return new Response(JSON.stringify(data), {
                  status: 200, headers: {'Content-Type': 'application/json'}
                });
              }
              var filtered;
              if (filterType === 'Other') {
                filtered = data.filter(function(item) {
                  return item.Tumor_Type !== 'Glioma' && item.Tumor_Type !== 'Brain Metastasis';
                });
              } else {
                filtered = data.filter(function(item) {
                  return item.Tumor_Type === filterType;
                });
              }
              return new Response(JSON.stringify(filtered), {
                status: 200, headers: {'Content-Type': 'application/json'}
              });
            });
          }
          return response;
        });
      };
    })();
    </script>
