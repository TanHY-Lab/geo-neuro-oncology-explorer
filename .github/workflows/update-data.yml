name: Daily Data Update

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate required secrets
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: |
          if [ -z "$NCBI_EMAIL" ]; then
            echo "Missing required repository secret: NCBI_EMAIL"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/update_data.py --skip-ai

      - name: Validate refreshed dataset
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          data_file = Path("data/geo_data.json")
          data = json.loads(data_file.read_text(encoding="utf-8"))

          years = set()
          data_types = set()
          for item in data:
              date_text = str(item.get("Submission_Date", ""))
              match = re.search(r"(19|20)\d{2}", date_text)
              if match:
                  years.add(match.group())
              data_type = str(item.get("Data_Type", "")).strip()
              if data_type:
                  data_types.add(data_type)

          print(f"dataset_count={len(data)}")
          print(f"years={sorted(years)}")
          print(f"data_types={sorted(data_types)[:20]}")

          if not data:
              raise SystemExit("data/geo_data.json is empty")
          if len(years) <= 1:
              raise SystemExit(f"Dataset still covers only one year: {sorted(years)}")
          if data_types <= {"bulk RNA-seq"}:
              raise SystemExit("Dataset still contains only bulk RNA-seq")
          PY

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/geo_data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update CNS tumor data $(date +%Y-%m-%d)"

          for i in 1 2 3 4 5; do
            echo "Attempt $i..."

            git rebase --abort || true

            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded!"
              exit 0
            fi

            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "All push attempts failed"
          exit 1
